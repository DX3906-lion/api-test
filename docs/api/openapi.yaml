openapi: 3.0.3
info:
  title: API Test 新脚本服务 Demo API
  version: 0.2.0
paths:
  /api/health:
    get:
      summary: 健康检查
      responses:
        '200':
          description: success
  /api/imports/drafts:
    post:
      summary: 导入 HAR 并生成脚本草稿
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [workspaceId, draftName, file]
              properties:
                workspaceId:
                  type: integer
                  format: int64
                draftName:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 导入成功
    get:
      summary: 草稿列表查询
      parameters:
        - name: workspaceId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 查询成功
  /api/imports/drafts/{draftId}:
    get:
      summary: 草稿详情查询
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 查询成功
    delete:
      summary: 删除草稿
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 删除成功
